<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find My AFL Team</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,900;1,400;1,900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070a;--card:#111116;--card2:#1a1a22;--border:#222230;
  --accent:#F2C94C;--accent2:#e8b800;--dim:#6b6b80;--sub:#9999b0;--txt:#f0f0f8;
  --font-display:'Barlow Condensed',sans-serif;--font-body:'Barlow',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--font-body);-webkit-font-smoothing:antialiased;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.6}}
.anim-fade-up{animation:fadeUp .4s ease both}
.anim-fade-in{animation:fadeIn .35s ease both}
.anim-scale-in{animation:scaleIn .4s cubic-bezier(.34,1.56,.64,1) both}

/* Layout */
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ── Landing ── */
.landing{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;
  background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(242,201,76,.08) 0%,transparent 70%)}
.landing h1{font-family:var(--font-display);font-weight:900;font-style:italic;line-height:.9;letter-spacing:-2px;margin-bottom:16px;
  font-size:clamp(52px,11vw,104px)}
.landing h1 span{color:var(--accent)}
.landing .tagline{font-size:clamp(15px,2vw,18px);color:var(--sub);max-width:420px;line-height:1.6;margin-bottom:40px}
.btn-start{padding:16px 40px;background:var(--accent);color:var(--bg);font-family:var(--font-display);font-weight:700;
  font-size:22px;text-transform:uppercase;letter-spacing:1px;border:none;border-radius:6px;cursor:pointer;
  transition:all .2s}
.btn-start:hover{background:#ffe066;transform:translateY(-2px);box-shadow:0 8px 30px rgba(242,201,76,.28)}
.btn-start:active{transform:translateY(0)}
.team-dots{margin-top:56px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:560px;opacity:.35}
.team-dots .dot{width:12px;height:12px;border-radius:50%}
.landing .footer-note{margin-top:24px;font-size:12px;color:var(--dim)}

/* ── Pathway ── */
.pathway-screen{padding:32px 16px;max-width:900px;margin:0 auto;width:100%}
.pathway-screen h2{font-family:var(--font-display);font-weight:900;font-style:italic;letter-spacing:-.5px;line-height:1;
  margin-bottom:8px;font-size:clamp(28px,5vw,44px)}
.pathway-screen h2 span{color:var(--accent)}
.pathway-screen .subtitle{color:var(--sub);font-size:15px;margin-bottom:28px}
.pathway-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:640px){.pathway-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.pathway-grid{grid-template-columns:repeat(4,1fr)}}
.pw-card{text-align:left;padding:20px;background:var(--card);border:1px solid var(--border);border-radius:12px;
  cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:8px}
.pw-card:hover{background:var(--card2);border-color:var(--accent);transform:translateY(-4px);box-shadow:0 8px 30px rgba(242,201,76,.08)}
@media(hover:none){.pw-card:hover{transform:none;box-shadow:none}}
.pw-card:active{background:var(--card2);border-color:var(--accent)}
.pw-card .emoji{font-size:28px;line-height:1}
.pw-card .pw-label{font-family:var(--font-display);font-weight:700;font-size:17px;text-transform:uppercase;letter-spacing:.5px;
  color:var(--txt);transition:color .2s}
.pw-card:hover .pw-label{color:var(--accent)}
.pw-card .pw-desc{font-size:12px;color:var(--dim);line-height:1.4}

/* ── Question ── */
.question-screen{padding:24px 16px;max-width:900px;margin:0 auto;width:100%}
.q-layout{display:grid;grid-template-columns:1fr;gap:16px;align-items:start}
@media(min-width:768px){.q-layout{grid-template-columns:260px 1fr}}

/* Sidebar */
.sidebar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:sticky;top:16px}
.sidebar-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);font-weight:600;margin-bottom:12px}
.sidebar-row{display:flex;flex-direction:column;gap:4px;padding:12px 0;border-bottom:1px solid var(--border)}
.sidebar-row .sr-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--dim)}
.sidebar-row .sr-value{font-size:13px;font-weight:600;color:var(--txt);line-height:1.4}
.remaining-badge{margin-top:12px;padding:12px;background:rgba(242,201,76,.06);border:1px solid rgba(242,201,76,.15);
  border-radius:8px;text-align:center}
.remaining-badge .rb-num{font-family:var(--font-display);font-weight:900;color:var(--accent);font-size:30px;line-height:1}
.remaining-badge .rb-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--sub);margin-top:4px}
.progress-bar{margin-top:12px;height:3px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .5s ease-out}

/* Question card */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px}
.q-nav{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.q-nav button{padding:6px 12px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--dim);
  font-size:13px;cursor:pointer;transition:all .15s;font-family:var(--font-body)}
.q-nav button:hover{border-color:var(--sub);color:var(--txt)}
.q-nav .spacer{flex:1}
.pivot-msg{margin-bottom:16px;padding:10px 16px;background:rgba(242,201,76,.05);border-left:3px solid var(--accent);
  border-radius:0 4px 4px 0;font-size:13px;color:var(--sub);font-style:italic}
.q-number{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--accent);font-weight:600;margin-bottom:8px}
.q-label{font-family:var(--font-display);font-weight:700;font-size:clamp(22px,4vw,30px);line-height:1.15;margin-bottom:8px}
.q-desc{font-size:14px;color:var(--sub);line-height:1.5;margin-bottom:24px}

/* Answer grid */
.answer-grid{display:grid;grid-template-columns:1fr;gap:12px}
.answer-grid.two-col{grid-template-columns:1fr}
@media(min-width:480px){.answer-grid.two-col{grid-template-columns:1fr 1fr}}
.ans-btn{text-align:left;padding:12px 16px;border-radius:8px;background:rgba(255,255,255,.03);border:1px solid var(--border);
  cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:4px;font-family:var(--font-body);width:100%;overflow-wrap:break-word;word-break:break-word}
.ans-btn:hover{background:rgba(242,201,76,.06);border-color:rgba(242,201,76,.45);transform:translateX(3px)}
@media(hover:none){.ans-btn:hover{transform:none}}
.ans-btn:active{transform:translateX(1px);background:rgba(242,201,76,.06);border-color:rgba(242,201,76,.45)}
.ans-btn .ans-label{font-size:15px;font-weight:600;color:var(--txt);transition:color .15s;line-height:1.3}
.ans-btn:hover .ans-label{color:#fff}
.ans-btn .ans-sub{font-size:12px;color:var(--dim);line-height:1.3}

/* ── Result ── */
.result-screen{padding:32px 16px;max-width:680px;margin:0 auto;width:100%}
.result-pre{font-size:13px;text-transform:uppercase;letter-spacing:3px;color:var(--dim);margin-bottom:16px}
.winner-hero{border-radius:12px;overflow:hidden;margin-bottom:20px;padding:28px;display:flex;align-items:flex-start;gap:20px;overflow-wrap:break-word;word-break:break-word}
.team-badge{flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:900;
  color:#fff;letter-spacing:-.5px;border-radius:14%}
.winner-info{flex:1;min-width:0;overflow:hidden}
.winner-info h1{font-family:var(--font-display);font-weight:900;font-style:italic;font-size:clamp(26px,6vw,52px);line-height:1;letter-spacing:-.5px;overflow-wrap:break-word}
.winner-info .nickname{font-size:clamp(10px,2.5vw,13px);text-transform:uppercase;letter-spacing:clamp(1px,0.5vw,3px);margin-top:4px;opacity:.75}
.winner-info .summary{font-size:14px;opacity:.8;margin-top:12px;line-height:1.5}

.why-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
.why-card .why-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);font-weight:600;margin-bottom:16px}
.why-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.why-row:last-child{border-bottom:none}
.why-row .arrow{color:var(--accent);font-size:14px;margin-top:2px;flex-shrink:0}
.why-row .bullet{font-size:14px;color:var(--sub);line-height:1.5;overflow-wrap:break-word;word-break:break-word;min-width:0}
.relaxed-row{display:flex;gap:12px;padding:10px 0;margin-top:4px}
.relaxed-row .tilde{color:rgba(255,200,100,.6);font-size:14px;margin-top:2px;flex-shrink:0}
.relaxed-row .relaxed-text{font-size:13px;font-style:italic;color:rgba(255,200,100,.65);line-height:1.5}

.runner-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:20px;
  display:flex;align-items:center;gap:16px}
.runner-info{flex:1;min-width:0}
.runner-info .ru-tag{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);margin-bottom:4px}
.runner-info .ru-name{font-family:var(--font-display);font-weight:700;font-style:italic;font-size:18px;color:var(--txt);overflow-wrap:break-word}
.runner-info .ru-diff{font-size:12px;color:var(--dim);margin-top:4px;line-height:1.4}

.cta-row{display:flex;flex-wrap:wrap;gap:12px}
.cta-row button{flex:1;min-width:140px;padding:14px;font-family:var(--font-display);font-weight:700;font-size:18px;text-transform:uppercase;
  letter-spacing:1px;border-radius:6px;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--accent);color:var(--bg);border:none}
.btn-primary:hover{background:#ffe066;transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--sub);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--sub);color:var(--txt)}

/* ── Mobile responsiveness ── */
@media(max-width:767px){
  .sidebar{position:static;order:-1}
  .sidebar-answers{display:none}
  .sidebar{padding:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .sidebar-title{margin-bottom:0;width:100%}
  #sidebarPathway{flex:1;min-width:120px;padding:8px 0;border-bottom:none}
  .remaining-badge{margin-top:0;padding:8px 16px;flex:0 0 auto;display:flex;align-items:center;gap:8px}
  .remaining-badge .rb-num{font-size:22px}
  .remaining-badge .rb-label{margin-top:0}
  .progress-bar{width:100%;margin-top:4px}
  .winner-hero{padding:20px;gap:14px;flex-wrap:wrap}
  .q-card{padding:16px}
  .q-desc{margin-bottom:16px}
  .result-screen{padding:20px 12px}
  .runner-card{padding:12px;gap:12px}
  .why-card{padding:16px}
}
@media(max-width:380px){
  .pathway-grid{grid-template-columns:1fr}
  .landing h1{letter-spacing:-1px}
  .btn-start{padding:14px 28px;font-size:19px}
  .winner-hero{padding:16px;gap:12px}
  .cta-row{flex-direction:column}
  .cta-row button{min-width:100%}
}
</style>
</head>

  </div>
</div>

<!-- Result -->
<div id="result" class="screen">
  <div class="result-screen anim-fade-in">
    <p class="result-pre anim-fade-up">Your AFL team is</p>
    <div id="resultContent"></div>

</div>

function getOptions(q,teams,answers){
  if(q.isDynamic&&q.getDynamicOptions)return q.getDynamicOptions(teams,answers);return q.options;
}
function isApplicable(q,answers){return q.appliesWhen?q.appliesWhen(answers):true}
function isUseful(q,teams,answers){
  const opts=getOptions(q,teams,answers);
  const active=opts.filter(o=>!['none','any','no','no_preference'].includes(o.value));
  if(!active.length)return false;
  return active.some(o=>{const f=q.filter(teams,o.value,answers);return f.length>0&&f.length<teams.length});
}
function replayFilters(answers){
  let rem=[...TEAMS];
  for(const ans of answers){const q=QUESTIONS.find(q=>q.id===ans.questionId);if(!q)continue;const f=q.filter(rem,ans.answer,answers);if(f.length>0)rem=f}
  return rem;
}
function resolveWinner(teams){
  const tier={high:3,medium:2,low:1},sz={giant:4,large:3,medium:2,small:1};
  return[...teams].sort((a,b)=>{const td=(tier[b.successTier]||0)-(tier[a.successTier]||0);if(td)return td;if(a.recentPremiership!==b.recentPremiership)return b.recentPremiership?1:-1;return(sz[b.fanbaseSize]||0)-(sz[a.fanbaseSize]||0)});
}

const RELAXATION_ORDER=['colour_secondary','brand_style','stadium_vibe','geo_vic_type','culture_size','success_recent','culture_vibe','success_appetite','colour_primary','mascot_type','geo_state','mascot_animal_class'];
function relaxConstraints(answers){
  for(const qId of RELAXATION_ORDER){
    const idx=answers.findIndex(a=>a.questionId===qId);if(idx===-1)continue;
    const relaxed=answers.filter((_,i)=>i!==idx);let rem=[...TEAMS];
    for(const ans of relaxed){const q=QUESTIONS.find(q=>q.id===ans.questionId);if(!q)continue;const f=q.filter(rem,ans.answer,relaxed);if(f.length>0)rem=f}
    if(rem.length>0){const rq=QUESTIONS.find(q=>q.id===qId);const ra=answers[idx];const ol=ra.label.replace(/^[^\s]*\s+/,'');
      return{remaining:rem,message:`No exact club matched every preference, so we broadened your "${rq?.shortLabel||qId}" answer slightly (you chose "${ol}") to keep your recommendation strong.`}}
  }
  return null;
}

function selectNextQuestion(remaining,answers,askedIds,pathway){
  if(remaining.length===2&&!askedIds.includes('final_choice'))return QUESTIONS.find(q=>q.id==='final_choice')||null;
  if(answers.some(a=>a.questionId==='social_influence'&&a.answer==='yes_align')&&!askedIds.includes('social_team_pick')){
    const sq=QUESTIONS.find(q=>q.id==='social_team_pick');if(sq&&isUseful(sq,remaining,answers))return sq}
  if(!askedIds.includes('social_influence')&&remaining.length<=4&&answers.length>=2){const si=QUESTIONS.find(q=>q.id==='social_influence');if(si)return si}
  const cands=QUESTIONS.filter(q=>{
    if(['final_choice','social_influence','social_team_pick'].includes(q.id))return false;
    if(askedIds.includes(q.id))return false;if(!isApplicable(q,answers))return false;if(!isUseful(q,remaining,answers))return false;return true});
  if(!cands.length)return null;
  const scored=cands.map(q=>({q,score:q.priority*2+q.tieBreakerStrength+(q.pathway===pathway?10:0)}));
  scored.sort((a,b)=>b.score-a.score);return scored[0].q;
}

function generateExplanation(winner,runnerUp,answers){
  const bullets=[];
  for(const ans of answers){
    const cl=ans.label.replace(/^[^\p{L}]*\s*/u,'').trim();
    switch(ans.questionId){
      case'colour_primary':if(ans.answer!=='none')bullets.push(`You gravitated toward ${cl.toLowerCase()} — a defining colour in ${winner.name}'s kit`);break;
      case'colour_secondary':if(ans.answer!=='none')bullets.push(`Your preference for ${cl.toLowerCase()} as a second colour narrowed the field further`);break;
      case'mascot_type':bullets.push(ans.answer==='animal'?`You wanted an animal mascot — ${winner.name} brings you the ${winner.mascotLabel}`:`You preferred a symbolic identity — the ${winner.nickname} fits that exactly`);break;
      case'mascot_animal_class':bullets.push(`You chose the ${cl} — that points directly to ${winner.name}`);break;
      case'geo_state':if(ans.answer!=='none')bullets.push(`Your ${cl} connection puts ${winner.name} right in the frame`);break;
      case'geo_vic_type':if(ans.answer!=='none'){const lb=ans.answer==='metro'?'Melbourne metro clubs':'regional Victoria';bullets.push(`You preferred ${lb} — ${winner.name} fits that profile`)}break;
      case'success_appetite':if(ans.answer!=='any'){const m={high:'a genuine premiership contender',medium:'a competitive, rising club',low:'an underdog to believe in'};bullets.push(`You wanted ${m[ans.answer]||ans.answer} — ${winner.name} delivers that`)}break;
      case'success_recent':if(ans.answer==='yes')bullets.push(winner.recentPremiership?`Recent success matters to you — ${winner.name} are proven winners`:`You wanted recent success; ${winner.name} is the strongest remaining match`);break;
      case'culture_size':if(ans.answer!=='any')bullets.push(`You wanted a ${cl.toLowerCase()} — ${winner.name}'s following matches that energy`);break;
      case'culture_vibe':bullets.push(`"${cl}" describes ${winner.name}'s culture exactly`);break;
      case'brand_style':if(ans.answer!=='none')bullets.push(`You leaned ${ans.answer==='traditional'?'toward heritage and tradition':'toward a modern identity'} — ${winner.name} is one of the AFL's most ${ans.answer} clubs`);break;
      case'stadium_vibe':if(ans.answer!=='none')bullets.push(`Your game-day preference — ${cl.toLowerCase()} — is what ${winner.name} delivers`);break;
      case'social_team_pick':bullets.push(`Your social connection to ${winner.name} was the decisive tie-breaker`);break;
      case'final_choice':bullets.push(runnerUp?`In the final head-to-head you chose ${winner.name} over ${runnerUp.name}`:`You made the final call — ${winner.name} it is`);break;
    }
  }
  if(!bullets.length)bullets.push(`${winner.name} best matched your overall profile across all the factors`);
  return bullets;
}

function generateRunnerUpDiff(winner,runnerUp,answers){
  for(let i=answers.length-1;i>=0;i--){
    const ans=answers[i];const q=QUESTIONS.find(q=>q.id===ans.questionId);if(!q)continue;
    const wIn=q.filter([winner,runnerUp],ans.answer,answers).some(t=>t.id===winner.id);
    const rIn=q.filter([winner,runnerUp],ans.answer,answers).some(t=>t.id===runnerUp.id);
    if(wIn&&!rIn){const cl=ans.label.replace(/^[^\p{L}]*\s*/u,'').trim();return`${winner.name} better matched your "${q.shortLabel}" answer (${cl.toLowerCase()})`}
  }
  const tier={high:3,medium:2,low:1};
  if((tier[winner.successTier]||0)>(tier[runnerUp.successTier]||0))return`${winner.name} has a stronger recent success record`;
  if(winner.recentPremiership&&!runnerUp.recentPremiership)return`${winner.name} has a more recent premiership`;
  return`${winner.name} edged ${runnerUp.name} across the overall profile`;
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let state={screen:'landing',pathway:null,remaining:[...TEAMS],answers:[],askedIds:[],currentQuestion:null,result:null,relaxedMessage:null,pivotMessage:null};

// ═══════════════════════════════════════════════
// UI RENDERING
// ═══════════════════════════════════════════════
function switchScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  window.scrollTo(0,0);
}

// Landing dots
(function(){const c=document.getElementById('teamDots');TEAMS.forEach(t=>{const d=document.createElement('div');d.className='dot';d.style.background=t.uiColors[0];d.title=t.name;c.appendChild(d)})})();

// Pathway grid
(function(){const g=document.getElementById('pathwayGrid');
  PATHWAYS.forEach((p,i)=>{const btn=document.createElement('button');btn.className='pw-card anim-fade-up';btn.style.animationDelay=`${i*.06}s`;
    btn.innerHTML=`<div class="emoji">${p.emoji}</div><div class="pw-label">${p.label}</div><div class="pw-desc">${p.desc}</div>`;
    btn.onclick=()=>selectPathway(p.id);g.appendChild(btn)})})();

function showPathway(){switchScreen('pathway')}

function selectPathway(p){
  const firstQId=PATHWAY_FIRST_Q[p];const q=QUESTIONS.find(q=>q.id===firstQId)||null;
  state={screen:'question',pathway:p,remaining:[...TEAMS],answers:[],askedIds:[],currentQuestion:q,result:null,relaxedMessage:null,pivotMessage:null};
  renderQuestion();switchScreen('question');
}

function renderQuestion(){
  const q=state.currentQuestion;if(!q)return;
  const pw=PATHWAYS.find(p=>p.id===state.pathway);

  // Sidebar
  document.getElementById('sidebarPathway').innerHTML=`<span class="sr-label">Starting with</span><span class="sr-value">${pw?.emoji||''} ${pw?.label||state.pathway}</span>`;
  const sa=document.getElementById('sidebarAnswers');sa.innerHTML='';
  state.answers.forEach(ans=>{const qq=QUESTIONS.find(q=>q.id===ans.questionId);const cl=ans.label.replace(/^[^\p{L}]*\s*/u,'').trim();
    sa.innerHTML+=`<div class="sidebar-row"><span class="sr-label">${qq?.shortLabel||ans.questionId}</span><span class="sr-value">${cl}</span></div>`});
  document.getElementById('remainCount').textContent=state.remaining.length;
  document.getElementById('remainLabel').textContent=state.remaining.length===1?'Club left':'Clubs in play';
  document.getElementById('progressFill').style.width=`${Math.min(state.answers.length/7,1)*100}%`;

  // Question card
  const options=getOptions(q,state.remaining,state.answers);
  const isHH=q.isHeadToHead;
  const isTwoOpt=options.length===2;
  let html=`<div class="q-nav"><button onclick="goBack()">← Back</button><div class="spacer"></div><button onclick="doRestart()">Restart</button></div>`;
  if(state.pivotMessage)html+=`<div class="pivot-msg">${state.pivotMessage}</div>`;
  html+=`<p class="q-number">Question ${state.answers.length+1}</p>`;
  html+=`<h2 class="q-label">${q.label}</h2>`;
  html+=`<p class="q-desc">${q.description}</p>`;
  html+=`<div class="answer-grid${(isTwoOpt||isHH)?' two-col':''}">`;
  options.forEach(o=>{html+=`<button class="ans-btn" onclick="submitAnswer('${o.value.replace(/'/g,"\\'")}')"><span class="ans-label">${o.label}</span>${o.subtitle?`<span class="ans-sub">${o.subtitle}</span>`:''}</button>`});
  html+=`</div>`;
  const card=document.getElementById('qCard');card.innerHTML=html;
  card.className='q-card anim-scale-in';void card.offsetWidth;
}

function submitAnswer(value){
  const q=state.currentQuestion;if(!q)return;
  const opts=getOptions(q,state.remaining,state.answers);
  const opt=opts.find(o=>o.value===value);const label=opt?.label||value;
  const newAnswer={questionId:q.id,answer:value,label};
  const newAnswers=[...state.answers,newAnswer];const newAskedIds=[...state.askedIds,q.id];

  let filtered=q.filter(state.remaining,value,state.answers);let relaxedMessage=null;
  if(filtered.length===0){const rx=relaxConstraints(newAnswers);if(rx){filtered=rx.remaining;relaxedMessage=rx.message}else{filtered=state.remaining}}
  const newRemaining=filtered.length>0?filtered:state.remaining;

  state.answers=newAnswers;state.askedIds=newAskedIds;state.remaining=newRemaining;
  if(relaxedMessage)state.relaxedMessage=relaxedMessage;

  // Resolved to one
  if(newRemaining.length===1){
    const winner=newRemaining[0];const cands=resolveWinner(state.remaining.filter(t=>t.id!==winner.id));const runnerUp=cands[0]||null;
    const explanation=generateExplanation(winner,runnerUp,newAnswers);const diff=runnerUp?generateRunnerUpDiff(winner,runnerUp,newAnswers):null;
    state.result={winner,runnerUp,explanation,runnerUpDiff:diff};renderResult();switchScreen('result');return}

  // Next question
  const nextQ=selectNextQuestion(newRemaining,newAnswers,newAskedIds,state.pathway);
  if(!nextQ){
    const sorted=resolveWinner(newRemaining);const winner=sorted[0];const runnerUp=sorted[1]||null;
    const explanation=generateExplanation(winner,runnerUp,newAnswers);const diff=runnerUp?generateRunnerUpDiff(winner,runnerUp,newAnswers):null;
    state.result={winner,runnerUp,explanation,runnerUpDiff:diff};renderResult();switchScreen('result');return}

  const curPw=q.pathway;const nextPw=nextQ.pathway;
  state.pivotMessage=(nextPw!==curPw&&!['social','final'].includes(nextPw))?'A few clubs still fit your choices — let\'s narrow it down from a different angle.':null;
  state.currentQuestion=nextQ;renderQuestion();
}

function goBack(){
  if(state.answers.length===0){switchScreen('pathway');return}
  const lastQId=state.askedIds[state.askedIds.length-1];
  state.answers=state.answers.slice(0,-1);state.askedIds=state.askedIds.slice(0,-1);
  state.remaining=replayFilters(state.answers);state.currentQuestion=QUESTIONS.find(q=>q.id===lastQId)||null;
  state.relaxedMessage=null;state.pivotMessage=null;renderQuestion();
}

function doRestart(){
  state={screen:'landing',pathway:null,remaining:[...TEAMS],answers:[],askedIds:[],currentQuestion:null,result:null,relaxedMessage:null,pivotMessage:null};
  switchScreen('landing');
}

function renderResult(){
  const{winner,runnerUp,explanation,runnerUpDiff}=state.result;
  const[c1,c2]=winner.uiColors;
  let html=`<div class="winner-hero anim-scale-in" style="background:linear-gradient(135deg,${c1} 0%,${c2} 100%)">
    <div class="team-badge" style="width:80px;height:80px;font-size:20px;border-radius:11px;background:rgba(255,255,255,.12)">${winner.initials}</div>
    <div class="winner-info"><h1>${winner.name}</h1><p class="nickname">${winner.nickname}</p><p class="summary">${winner.summary}</p></div></div>`;

  html+=`<div class="why-card anim-fade-up" style="animation-delay:.1s"><p class="why-title">Why this team</p>`;
  explanation.forEach(b=>{html+=`<div class="why-row"><span class="arrow">→</span><span class="bullet">${b}</span></div>`});
  if(state.relaxedMessage)html+=`<div class="relaxed-row"><span class="tilde">~</span><span class="relaxed-text">${state.relaxedMessage}</span></div>`;
  html+=`</div>`;

  if(runnerUp){
    html+=`<div class="runner-card anim-fade-up" style="animation-delay:.2s">
      <div class="runner-info"><p class="ru-tag">Runner-up</p><p class="ru-name">${runnerUp.name}</p>${runnerUpDiff?`<p class="ru-diff">${runnerUpDiff}</p>`:''}</div>
      <div class="team-badge" style="width:48px;height:48px;font-size:13px;border-radius:7px;background:linear-gradient(135deg,${runnerUp.uiColors[0]} 0%,${runnerUp.uiColors[1]} 100%)">${runnerUp.initials}</div></div>`;
  }

  html+=`<div class="cta-row anim-fade-up" style="animation-delay:.3s">
    <button class="btn-primary" onclick="doRestart()">Try Again</button>
    <button class="btn-secondary" onclick="changePathway()">Change Pathway</button></div>`;

  document.getElementById('resultContent').innerHTML=html;
}

function changePathway(){
  state={screen:'pathway',pathway:null,remaining:[...TEAMS],answers:[],askedIds:[],currentQuestion:null,result:null,relaxedMessage:null,pivotMessage:null};
  switchScreen('pathway');
}
</script>
